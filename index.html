/* inlined: css/desktop-shell.css */
:root {
  --desk-header-h: 72px;
  --desk-nav-w: 84px;
  --desk-left-w: 320px;
  --desk-right-w: 760px;

  --desk-bg: #f4f7fb;
  --desk-panel: rgba(255, 255, 255, 0.88);
  --desk-panel-strong: #ffffff;
  --desk-border: rgba(25, 45, 72, 0.08);
  --desk-shadow: 0 8px 30px rgba(17, 37, 63, 0.06);

  --desk-text: #122033;
  --desk-text-muted: #617188;
  --desk-accent: #2f6fed;

  --desk-radius-xl: 20px;
  --desk-radius-lg: 14px;
  --desk-radius-sm: 12px;

  --desk-gap-1: 8px;
  --desk-gap-2: 12px;
  --desk-gap-3: 16px;
  --desk-gap-4: 20px;
  --desk-gap-5: 24px;

*, *::before, *::after { box-sizing: border-box; }

html, body {

  height: 100%;

/* inlined: js/20-desktop-store.js */
(function () {
  window.HAHBoard = window.HAHBoard || {};

  const state = {
    route: { view: 'board', entityId: null, preset: null },
    boardroundMode: false,
    selectedPatientId: null,
    selectedTaskId: null,
    selectedInsightKey: null,
    board: {
      filters: {},
      sort: 'priority',
      group: 'none',
      density: 'standard',
      savedView: 'all-active'
    },
    patient: { jumpListMode: 'current-cohort' },
    tasks: {
      filters: {},
      sort: 'due',
      group: 'due-state',
      density: 'standard',
      savedView: 'due-today'
    },
    insights: {
      range: '7d',
      preset: 'service-overview',
      filters: {}
    },
    ui: {
      leftPaneCollapsed: false,
      rightPaneCollapsed: false,
      commandPaletteOpen: false,
      syncState: 'synced'
    }
  };

  const listeners = new Set();

  function clone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function getState() { return clone(state); }
  function getRawState() { return state; }

  function setState(patch) {
    deepMerge(state, patch);
    emit();
  }

  function replaceState(nextState) {
    const fresh = clone(nextState);
    Object.keys(state).forEach((key) => delete state[key]);
    Object.assign(state, fresh);
    emit();
  }

  function subscribe(fn) {
    listeners.add(fn);
    return function unsubscribe() { listeners.delete(fn); };
  }

  function emit() {
    const snapshot = getState();
    listeners.forEach((fn) => fn(snapshot));
  }

  function deepMerge(target, source) {
    if (!source || typeof source !== 'object') return target;
    Object.keys(source).forEach((key) => {
      const srcVal = source[key];
      const tgtVal = target[key];
      if (Array.isArray(srcVal)) {
        target[key] = srcVal.slice();
        return;
      }
      if (srcVal && typeof srcVal === 'object' && tgtVal && typeof tgtVal === 'object' && !Array.isArray(srcVal) && !Array.isArray(tgtVal)) {
        deepMerge(tgtVal, srcVal);
        return;
      }
      target[key] = srcVal;
    });
    return target;
  }

  window.HAHBoard.store = {
    getState,
    getRawState,
    setState,
    replaceState,
    subscribe
  };
})();

</script>
  <script>
/* inlined: js/21-desktop-router.js */
(function () {
  window.HAHBoard = window.HAHBoard || {};
  const store = window.HAHBoard.store;

  const DEFAULT_ROUTE = { view: 'board', entityId: null, preset: null };

  function initRouter() {
    window.addEventListener('hashchange', syncFromLocation);
    syncFromLocation();
  }

  function syncFromLocation() {
    const route = parseHash(window.location.hash);
    store.setState({ route });
  }

  function parseHash(hash) {
    const raw = (hash || '').replace(/^#\/?/, '').trim();
    if (!raw) return { ...DEFAULT_ROUTE };
    const [pathPart, queryPart] = raw.split('?');
    const segments = pathPart.split('/').filter(Boolean);
    const params = new URLSearchParams(queryPart || '');
    const view = segments[0] || 'board';
    const entityId = segments[1] || null;
    const preset = params.get('view') || params.get('preset') || null;
    if (!['board', 'patient', 'tasks', 'insights', 'settings'].includes(view)) return { ...DEFAULT_ROUTE };
    return { view, entityId, preset };
  }

  function buildHash(route) {
    const next = { ...DEFAULT_ROUTE, ...(route || {}) };
    let hash = '#/' + next.view;
    if (next.entityId) hash += '/' + encodeURIComponent(next.entityId);
    const params = new URLSearchParams();
    if (next.preset) params.set('view', next.preset);
    const query = params.toString();
    if (query) hash += '?' + query;
    return hash;
  }

  function navigate(route, options) {
    const hash = buildHash(route);
    const replace = options && options.replace;
    if (replace) {
      history.replaceState(null, '', hash);
      syncFromLocation();
      return;
    }
    if (window.location.hash === hash) {
      syncFromLocation();
      return;
    }
    window.location.hash = hash;
  }

  function goToBoard(preset) { navigate({ view: 'board', preset: preset || null }); }
  function goToPatient(patientId) { navigate({ view: 'patient', entityId: patientId || null }); }
  function goToTasks(preset) { navigate({ view: 'tasks', preset: preset || null }); }
  function goToInsights(preset) { navigate({ view: 'insights', preset: preset || null }); }

  window.HAHBoard.router = {
    initRouter,
    parseHash,
    buildHash,
    navigate,
    goToBoard,
    goToPatient,
    goToTasks,
    goToInsights
  };
})();

</script>

/* inlined: js/23-desktop-components.js */
(function () {
  window.HAHBoard = window.HAHBoard || {};

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function classNames() {
    return Array.from(arguments).filter(Boolean).join(' ');
  }

  function card(title, body, options) {
    const opts = options || {};
    const subtitle = opts.subtitle ? `<div class="hah-card-subtitle">${escapeHtml(opts.subtitle)}</div>` : '';
    const header = title ? `
      <div class="hah-section-head">
        <div>
          <div class="hah-card-title">${escapeHtml(title)}</div>
          ${subtitle}
        </div>
        ${opts.headerRight || ''}
      </div>
    ` : '';
    return `
      <section class="hah-card ${opts.className || ''}">
        <div class="hah-card-inner">
          ${header}
          ${body || ''}
        </div>
      </section>
    `;
  }

  function metricCard(metric) {
    const tone = metric.tone ? `is-${metric.tone}` : '';
    return `
      <button
        type="button"
        class="hah-metric-card ${tone}"
        data-board-action="metric-filter"
        data-metric-key="${escapeHtml(metric.key)}"
      >
        <div class="hah-metric-label">${escapeHtml(metric.label)}</div>
        <div class="hah-metric-value">${escapeHtml(metric.value)}</div>
        <div class="hah-metric-sub">${escapeHtml(metric.subtext || '')}</div>
      </button>
    `;
  }

  function badge(label, tone) {
    return `<span class="hah-badge ${tone ? `is-${tone}` : ''}">${escapeHtml(label)}</span>`;
  }

  function pillButton(label, action, attrs) {
    const extraAttrs = attrs || '';
    return `
      <button
        type="button"
        class="hah-inline-pill"
        data-board-action="${escapeHtml(action)}"
        ${extraAttrs}
      >${escapeHtml(label)}</button>
    `;
  }

  function keyValueGrid(items) {
    return `
      <div class="hah-kv-grid">
        ${items.map(item => `
          <div class="hah-kv-item">
            <div class="hah-kv-label">${escapeHtml(item.label)}</div>
            <div class="hah-kv-value">${escapeHtml(item.value)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function table(headers, bodyHtml, options) {
    const opts = options || {};

    mainPane.innerHTML = renderMainPane(state);
    rightPane.innerHTML = renderRightPane(state);
  }

  function renderLeftPane(state) {
    switch (state.route.view) {
      case 'board':
        if (window.HAHBoard.boardScreen && window.HAHBoard.boardScreen.renderLeftPane) return window.HAHBoard.boardScreen.renderLeftPane(state);
        return renderGenericPane('Board filters');
      case 'patient': return renderPatientLeftPane(state);
      case 'tasks': return renderTasksLeftPane(state);
      case 'insights': return renderInsightsLeftPane(state);
      default: return renderGenericPane('Navigation');
    }
  }

  function renderMainPane(state) {
    switch (state.route.view) {
      case 'board':
        if (window.HAHBoard.boardScreen && window.HAHBoard.boardScreen.renderMainPane) return window.HAHBoard.boardScreen.renderMainPane(state);
        return renderSurfacePlaceholder('Board', 'Whole-service working view');
      case 'patient': return renderPatientPlaceholder(state);
      case 'tasks': return renderSurfacePlaceholder('Tasks', 'Action, ownership, and blockers');
      case 'insights': return renderSurfacePlaceholder('Insights', 'Service-level operational intelligence');
      case 'settings': return renderSurfacePlaceholder('Settings', 'Desktop options and configuration');
      default: return renderSurfacePlaceholder('Board', 'Whole-service working view');
    }
  }

  function renderRightPane(state) {
    switch (state.route.view) {
      case 'board':
        if (window.HAHBoard.boardScreen && window.HAHBoard.boardScreen.renderRightPane) return window.HAHBoard.boardScreen.renderRightPane(state);
        return renderGenericPane('Selected patient preview');
      case 'patient': return renderGenericPane('Patient actions');
      case 'tasks': return renderGenericPane('Selected task detail');
      case 'insights': return renderGenericPane('Selected cohort drill-in');
      default: return renderGenericPane('Context');
    }
  }

  function renderPatientLeftPane(state) {
    return `
      <div class="hah-stack">
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Patient jump list</div>
            <p class="hah-muted">Recent patients, current cohort neighbours, quick search.</p>
            <p class="hah-muted">Patient id: ${escapeHtml(state.route.entityId || 'none selected')}</p>
          </div>
        </section>
      </div>
    `;
  }

  function renderTasksLeftPane(state) {
    return `
      <div class="hah-stack">
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Task filters</div>
            <p class="hah-muted">Due state, owner, category, blockers, saved views.</p>
            <p class="hah-muted">Current view: ${escapeHtml(state.tasks.savedView)}</p>
          </div>
        </section>
      </div>
    `;
  }

  function renderInsightsLeftPane(state) {
    return `
      <div class="hah-stack">
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Insight presets</div>
            <p class="hah-muted">Time range, service lens, cohort presets.</p>
            <p class="hah-muted">Range: ${escapeHtml(state.insights.range)}</p>
          </div>
        </section>
      </div>
    `;
  }

  function renderGenericPane(title) {
    return `
      <div class="hah-stack">
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">${escapeHtml(title)}</div>
            <p class="hah-muted">First-pass scaffold placeholder.</p>
          </div>
        </section>
      </div>
    `;
  }

  function renderSurfacePlaceholder(title, subtitle) {
    return `
      <div class="hah-surface-placeholder">
        <section class="hah-card hah-surface-hero">
          <h1 class="hah-surface-title">${escapeHtml(title)}</h1>
          <p class="hah-surface-subtitle">${escapeHtml(subtitle)}</p>
        </section>
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Scaffold status</div>
            <p class="hah-muted">The shell, routing, left pane, main workspace, and right pane are live. Surface-specific modules slot in next without changing this structure.</p>
          </div>
        </section>
      </div>
    `;
  }

  function renderPatientPlaceholder(state) {
    const patientId = state.route.entityId || state.selectedPatientId || 'none selected';
    return `
      <div class="hah-surface-placeholder">
        <section class="hah-card hah-surface-hero">
          <h1 class="hah-surface-title">Patient workspace</h1>
          <p class="hah-surface-subtitle">Single-patient command view placeholder for prototype 0.1</p>
        </section>
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Current patient</div>
            <p class="hah-muted">Patient id: ${escapeHtml(patientId)}</p>
            <p class="hah-muted">This route is live so the Board → Patient navigation can be tested now, before the full patient workspace is built.</p>
          </div>
        </section>
      </div>
    `;
  }

  function normaliseSyncLabel(value) {
    switch (value) {
      case 'syncing': return 'Syncing';
      case 'update-available': return 'Update available';
      case 'error': return 'Sync error';
      default: return 'Prototype';
    }
  }

  function isTextInput(el) {
    if (!el) return false;
    const tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || el.isContentEditable;
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initDesktopShell);
  else initDesktopShell();

  window.HAHBoard.desktopShell = { init: initDesktopShell };
})();
